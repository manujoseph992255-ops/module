<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: white; padding: 40px; }
        #chart-container { width: 800px; height: 500px; border: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    <div id="chart-container">
        <canvas id="myChart"></canvas>
    </div>
    <script>
        const ctx = document.getElementById('myChart').getContext('2d');
        new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [{
                    label: 'Variable X vs Variable Y',
                    data: [
                        {x: 10, y: 20}, {x: 20, y: 10}, {x: 30, y: 32}, 
                        {x: 40, y: 30}, {x: 50, y: 38}, {x: 60, y: 19}, 
                        {x: 70, y: 44}, {x: 80, y: 55}
                    ],
                    backgroundColor: '#4472c4',
                    pointRadius: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    x: {
                        title: { display: true, text: 'Variable X', font: { weight: 'bold', size: 16 } },
                        min: 0, max: 90,
                        ticks: { stepSize: 10 }
                    },
                    y: {
                        title: { display: true, text: 'Variable Y', font: { weight: 'bold', size: 16 } },
                        min: 0, max: 60,
                        ticks: { stepSize: 10 }
                    }
                },
                plugins: {
                    legend: { display: false }
                }
            }
        });
    </script>
    </div>

</body>
</html>
