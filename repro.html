<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: white; padding: 50px; }
        .code-snippet { 
            font-family: 'Fira Code', monospace; 
            background: #0f172a; 
            padding: 0; 
            border-radius: 12px; 
            font-size: 18px; 
            margin: 15px auto 0; 
            width: fit-content; 
            min-width: 60%; 
            max-width: 1000px; 
            color: #38bdf8; 
            text-align: left;
            line-height: 1.8; 
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden; 
        }
        .terminal-header {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .terminal-content {
            padding: 25px 35px;
        }
        .answer-label-terminal {
            font-size: 10px;
            font-weight: 800;
            color: #ffffff; 
            opacity: 0.8; 
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .dnd-target { 
            display: inline-block; 
            min-width: 120px; 
            height: 38px; 
            background: #f8fafc; 
            border: 2px dashed #0066ff; 
            border-radius: 8px; 
            vertical-align: middle; 
            margin: 2px 6px; 
            transition: all 0.2s;
        }
        .dnd-target.filled { 
            border-style: solid; 
            background: #0066ff; 
            color: #white; 
            text-align: center; 
            line-height: 38px; 
            font-weight: 700; 
        }
    </style>
</head>
<body>
    <div class='code-snippet'>
        <div class="terminal-header"><div class="answer-label-terminal">ANSWER AREA</div></div>
        <div class="terminal-content">
            <div style='display:grid; grid-template-columns: 1fr auto; gap:20px; align-items:center; padding: 10px 0;'>
                <div>1st Operation:</div> <span class="dnd-target"></span>
                <div>2nd Operation:</div> <span class="dnd-target"></span>
                <div>3rd Operation:</div> <span class="dnd-target"></span>
                <div>4th Operation:</div> <span class="dnd-target"></span>
                <div>5th Operation:</div> <span class="dnd-target"></span>
                <div>6th Operation:</div> <span class="dnd-target"></span>
            </div>
        </div>
    </div>
    </div>

</body>
</html>
