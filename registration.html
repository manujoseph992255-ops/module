<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Registration | KVJ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%); 
            color: #1e293b; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px;
        }

        .reg-card {
            background: #ffffff;
            width: 100%;
            max-width: 500px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .reg-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .reg-header img {
            height: 40px;
            margin-bottom: 20px;
        }

        .reg-header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
        }

        .reg-header p {
            color: #64748b;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: inherit;
            transition: all 0.2s;
            outline: none;
        }

        .form-control:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-control:read-only {
            background: #f1f5f9;
            cursor: not-allowed;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background: #334155;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.2);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #64748b;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: #0f172a;
        }

        .success-msg {
            display: none;
            text-align: center;
            color: #10b981;
            font-weight: 600;
            margin-top: 20px;
            padding: 15px;
            background: #ecfdf5;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="reg-card">
        <div class="reg-header">
            <img src="Kvj logo.jpeg" alt="KVJ Logo">
            <h1>Student Registration</h1>
            <p>Please enter your details to enroll in the course.</p>
        </div>

        <form id="registrationForm" onsubmit="handleFormSubmit(event)">
            <div class="form-group">
                <label for="courseName">Selected Course</label>
                <input type="text" id="courseName" class="form-control" readonly>
            </div>

            <div class="form-group">
                <label for="fullName">Full Name</label>
                <input type="text" id="fullName" class="form-control" placeholder="e.g. Rahul Sharma" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" class="form-control" placeholder="e.g. rahul@example.com" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" class="form-control" placeholder="e.g. +91 98765 43210" required>
            </div>

            <div class="form-group">
                <label for="branch">Branch / Specialization (Optional)</label>
                <input type="text" id="branch" class="form-control" placeholder="e.g. Computer Science">
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">Submit Registration</button>
        </form>

        <div id="successMsg" class="success-msg">
            ✓ Registration Successful! Welcome to the course.
        </div>

        <a href="index.html" class="back-link">← Back to Dashboard</a>
    </div>

    <script>
        // Get course from URL
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const course = params.get('course');
            if (course) {
                document.getElementById('courseName').value = decodeURIComponent(course);
            } else {
                document.getElementById('courseName').value = "General Enrollment";
            }

            // Pre-fill info from session/local storage if available
            const savedName = sessionStorage.getItem('userName') || localStorage.getItem('strategist_user');
            const savedEmail = localStorage.getItem('gmail');
            const savedPhone = localStorage.getItem('strategist_phone');

            if (savedName && savedName !== 'User') {
                document.getElementById('fullName').value = savedName;
            }
            
            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('email').readOnly = true;
                document.getElementById('email').style.backgroundColor = '#f1f5f9';
            }
            
            if (savedPhone) {
                document.getElementById('phone').value = savedPhone;
                document.getElementById('phone').readOnly = true;
                document.getElementById('phone').style.backgroundColor = '#f1f5f9';
            }
        });

        function handleFormSubmit(event) {
            event.preventDefault();
            const btn = document.getElementById('submitBtn');
            const form = document.getElementById('registrationForm');
            const msg = document.getElementById('successMsg');

            const fullName = document.getElementById('fullName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const branch = document.getElementById('branch').value;
            const course = document.getElementById('courseName').value;

            btn.disabled = true;
            btn.textContent = "Processing...";

            // Save details to submit AFTER payment is complete
            sessionStorage.setItem('pendingRegistration', JSON.stringify({
                name: fullName,
                email: email,
                phone: phone,
                branch: branch,
                course: course
            }));

            // Simulate form submission locally
            setTimeout(() => {
                form.style.display = 'none';
                msg.innerHTML = "✓ Registration Details Saved! Proceeding to Payment...";
                msg.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = 'payment.html?course=' + encodeURIComponent(course);
                }, 1500);
            }, 800);
        }
    </script>
</body>
</html>
